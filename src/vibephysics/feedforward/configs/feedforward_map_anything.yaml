# Map-Anything model_factory demo config
# image_path accepts: folder of images, single image, or video (.mov, .mp4, ...)
engine: map_anything
image_path: test_recording.MOV
output_path: null
verbose: true

video:
  fps: 2
  quality: 2
  max_frames: null
  max_frames_mode: first

output:
  save_blend: null
  save_html: null      # set to visual.html or use --html to save an interactive Plotly view
  save_frames: false   # true = save model-preprocessed RGB frames next to predictions.npz
  min_confidence: 2.0
  filter_edges: true
  point_scale: 0.01
  random_points_per_frame: 4000 # random per-frame sample after confidence filtering; null/0 = dense
  total_random_points: null # optional global random sample after per-frame filtering
  compact: false      # true = force compact colored points + camera poses only
  animate: true
  animation_fps: 24
  align_ground: true

lingbot_map:
  model: lingbot-map
  checkpoint: null
  image_size: 518
  mode: auto
  keyframe_interval: null
  max_streaming_keyframes: null
  window_size: 64
  overlap_size: 16
  overlap_keyframes: null
  use_sdpa: false
  mask_sky: false

vggt_omega:
  checkpoint: null
  checkpoint_name: vggt-omega-1b-512
  resolution: 512
  preprocess_mode: balanced
  enable_alignment: false
  conf_percentile: 50.0
  depth_edge_rtol: 0.03

vgg_ttt:
  model_id: nvidia/vgg-ttt
  preprocess_mode: crop
  image_size: 518
  conf_percentile: 50.0
  depth_edge_rtol: 0.03
  num_ttt_steps: 1
  memory_efficient_inference: false

map_anything:
  # Direct model_factory key. Defaults follow README "Example 2".
  # Try other keys by changing model plus preprocessing below:
  #   mapanything/mapanything_apache/da3 -> norm_type: dinov2
  #   dust3r/mast3r/pow3r -> resolution: 512, norm_type: dust3r, patch_size: 16
  #   pi3/pi3x/moge -> norm_type: identity
  model: vggt
  model_kwargs: null          # null = use repo defaults for the selected model
  install_all: false
  resolution: 518
  norm_type: identity
  patch_size: 14
  resize_mode: fixed_mapping
  size: null
