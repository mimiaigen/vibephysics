# LingBot-Map demo config (defaults match official demo.py)
# image_path accepts: folder of images, single image, or video (.mov, .mp4, ...)
engine: lingbot_map
image_path: test_recording.MOV
output_path: null
verbose: true

video:
  fps: 2              # extraction rate; saved to .vibephysics_extract_fps and reused for animation
  quality: 2
  max_frames: null     # null = all frames; set N to limit count (both engines)
  max_frames_mode: first   # first = first N consecutive; spread = evenly across input

output:
  save_blend: scene.blend
  min_confidence: 1.5   # official demo.py --conf_threshold
  filter_edges: true
  point_scale: 0.01
  animate: true
  animation_fps: 24
  align_ground: true

lingbot_map:
  model: lingbot-map
  checkpoint: null
  image_size: 518       # official --image_size
  mode: auto            # auto | streaming | windowed (auto: <=320 streaming, >320 windowed)
  keyframe_interval: null  # null = auto (1, or streaming-only ceil(n/320) if mode=streaming)
  window_size: 64       # official --window_size (windowed mode)
  overlap_size: 16      # official --overlap_size (windowed mode)
  overlap_keyframes: null
  use_sdpa: false       # official CUDA default (FlashInfer); auto-falls back to SDPA on Mac
  mask_sky: false

vggt_omega:
  checkpoint: null
  checkpoint_name: vggt-omega-1b-512
  resolution: 512
  enable_alignment: false
  conf_percentile: 50.0
  depth_edge_rtol: 0.03

vgg_ttt:
  model_id: nvidia/vgg-ttt
  preprocess_mode: crop
  image_size: 518
  conf_percentile: 50.0
  depth_edge_rtol: 0.03
  num_ttt_steps: 1
  memory_efficient_inference: false

map_anything:
  model: vggt
  model_kwargs: null
  install_all: false
  resolution: 518
  norm_type: identity
  patch_size: 14
  resize_mode: fixed_mapping
  size: null
