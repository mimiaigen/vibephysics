# Sparse SfM pipeline (GLOMAP / COLMAP)
# image_path accepts: folder of images, single image, or video (.mov, .mp4, ...)
engine: glomap
image_path: path/to/images
output_path: null

video:
  fps: 2
  quality: 2

matcher: sequential
camera_model: SIMPLE_RADIAL
verbose: true

visualize:
  save_blend: true
  animate: true
  animation_fps: 24
  point_size: 0.03
  rotation: [-90, 0, 0]
